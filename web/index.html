<!doctype html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>asciify — 이미지/GIF → ASCII 아트</title>
<style>
  *, *::before, *::after { box-sizing: border-box; }
  html { --bg:#222; --text:#fff; --dim:rgba(255,255,255,.45); --card:#2e2e2e; --border:rgba(255,255,255,.12); --accent:#4ec9b0; }
  body { margin:0; background:var(--bg); color:var(--text); font-family:'Nanum Gothic',sans-serif; }
  header { padding:18px 5%; border-bottom:1px solid var(--border); }
  header h1 { font-size:1.2rem; margin:0; }
  header h1 span { color:var(--accent); }
  main { max-width:900px; margin:40px auto; padding:0 5%; }

  .drop-zone {
    border: 2px dashed var(--border);
    border-radius: 12px;
    padding: 48px 24px;
    text-align: center;
    cursor: pointer;
    transition: border-color .15s, background .15s;
  }
  .drop-zone.drag-over { border-color: var(--accent); background: rgba(78,201,176,.06); }
  .drop-zone p { opacity:.6; margin:8px 0 0; font-size:.9rem; }

  .controls { display:flex; gap:12px; align-items:center; margin:20px 0; flex-wrap:wrap; }
  .controls label { font-size:.85rem; opacity:.7; }
  .controls input[type=range] { width:160px; }

  #output {
    background: #111;
    border-radius: 8px;
    padding: 16px;
    overflow-x: auto;
    font-family: 'Fira Code', monospace;
    font-size: 6px;
    line-height: 1.0;
    white-space: pre;
    color: #eee;
    min-height: 120px;
  }

  .status { font-size:.85rem; opacity:.6; margin:10px 0; }

  .download-bar { display:flex; gap:10px; margin:10px 0 20px; }
  .download-bar button {
    background: transparent;
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 8px 14px;
    font-size: .85rem;
    cursor: pointer;
    transition: border-color .15s, color .15s;
  }
  .download-bar button:hover:not(:disabled) { border-color: var(--accent); color: var(--accent); }
  .download-bar button:disabled { opacity:.35; cursor:not-allowed; }
</style>
</head>
<body>

<header><h1>asciify<span> — 이미지/GIF → ASCII 아트</span></h1></header>

<main>
  <div class="drop-zone" id="drop-zone">
    <div>여기에 이미지/GIF를 드래그하거나 클릭해서 선택하세요</div>
    <p>PNG, JPEG, GIF 지원</p>
    <input type="file" id="file-input" accept="image/*" hidden />
  </div>

  <div class="controls">
    <label>가로 문자 수: <span id="cols-value">100</span></label>
    <input type="range" id="cols-slider" min="30" max="240" value="100" />
  </div>

  <div class="status" id="status"></div>

  <div class="download-bar">
    <button id="download-text-btn" disabled>텍스트로 다운로드</button>
    <button id="download-image-btn" disabled>이미지로 다운로드</button>
  </div>

  <pre id="output"></pre>
</main>

<script type="module" src="/main.js"></script>
</body>
</html>
